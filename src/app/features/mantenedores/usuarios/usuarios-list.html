<app-TituloComponente [titulo]="'USUARIOS'" />

<!--<app-ExportaMatTableComponente [exporter]="exporter" [nombreArchivo]="'Usuarios'" />-->

<section>
  <div class="ml-2 mr-2">
    <mat-form-field class="inputBuscar">
      <mat-icon matPrefix>search</mat-icon>
      <input matInput (keyup)="applyFilter($event)" placeholder="Buscar" />
    </mat-form-field>
  </div>

  <div class="tabla-mantenedor">
    <table
      mat-table
      [dataSource]="dataSource()"
      multiTemplateDataRows
      matSort
      class="tabla-cabecera"
    >
      <!-- ID Index -->
      <ng-container matColumnDef="index">
        <th id="indexI" mat-header-cell *matHeaderCellDef mat-sort-header class="col-index">N°</th>
        <td mat-cell *matCellDef="let row; let i = dataIndex" class="col-index">
          {{ i + 1 + myPaginator.pageIndex * myPaginator.pageSize }}
        </td>
      </ng-container>

      <!-- ID Column -->
      <ng-container matColumnDef="usuario">
        <th id="usuarioI" mat-header-cell *matHeaderCellDef mat-sort-header class="col-usuario">
          USUARIO
        </th>
        <td mat-cell *matCellDef="let row" class="col-usuario">{{ row.usuario }}</td>
      </ng-container>

      <ng-container matColumnDef="rutUsuario">
        <th id="rutUsuarioI" mat-header-cell *matHeaderCellDef mat-sort-header class="col-rut">
          RUT
        </th>
        <td mat-cell *matCellDef="let row" class="col-rut">
          {{ row.rutUsuario }}
        </td>
      </ng-container>

      <ng-container matColumnDef="nombres">
        <th id="nombresI" mat-header-cell *matHeaderCellDef mat-sort-header class="col-nombres">
          NOMBRES
        </th>
        <td mat-cell *matCellDef="let row" class="col-nombres">{{ row.nombres }}</td>
      </ng-container>

      <ng-container matColumnDef="apellidoPaterno">
        <th
          id="apellidoPaternoI"
          mat-header-cell
          *matHeaderCellDef
          mat-sort-header
          class="col-apellido"
        >
          APELLIDO PATERNO
        </th>
        <td class="ocultar-div col-apellido" mat-cell *matCellDef="let row">
          {{ row.apellidoPaterno }}
        </td>
      </ng-container>

      <ng-container matColumnDef="opciones">
        <th id="opcionesI" mat-header-cell *matHeaderCellDef class="col-opciones opciones-header">
          <button
            matTooltip="Agregar"
            mat-icon-button
            class="nuevo"
            (click)="agregar('800ms', '500ms')"
          >
            <mat-icon>add</mat-icon>
          </button>
        </th>

        <td mat-cell *matCellDef="let row; let i = index" class="col-opciones opciones-cell">
          <button
            matTooltip="Modificar"
            mat-icon-button
            class="tabla"
            (click)="editar(row, '800ms', '500ms')"
          >
            <mat-icon>edit</mat-icon>
          </button>

          <button matTooltip="Consultar" mat-icon-button class="tabla" (click)="consultar(row)">
            <mat-icon>search</mat-icon>
          </button>
          <!--
          <button matTooltip="Contraseña" color="accent" (click)="reseteaContrasena(row)">
            <mat-icon>vpn_key</mat-icon>
          </button>
-->
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns" class="example-element-row"></tr>
    </table>

    <mat-paginator #myPaginator [pageSizeOptions]="[10, 20, 30, 100]"></mat-paginator>
  </div>
</section>
