<app-TituloComponente [titulo]="'USUARIOS'" />

<!--<app-ExportaMatTableComponente [exporter]="exporter" [nombreArchivo]="'Usuarios'" />-->

<div class="ml-2 mr-2">
  <mat-form-field class="inputBuscar">
    <mat-icon matPrefix>search</mat-icon>
    <input matInput (keyup)="applyFilter($event)" placeholder="Buscar" />
  </mat-form-field>
</div>

<table mat-table [dataSource]="dataSource()" multiTemplateDataRows matSort>
  <!-- ID Index -->
  <ng-container matColumnDef="index">
    <th id="indexI" mat-header-cell *matHeaderCellDef mat-sort-header style="width: 5%">N°</th>
    <td mat-cell *matCellDef="let row; let i = dataIndex" style="width: 5%">
      {{ i + 1 + myPaginator.pageIndex * myPaginator.pageSize }}
    </td>
  </ng-container>

  <!-- ID Column -->
  <ng-container matColumnDef="usuario">
    <th id="usuarioI" mat-header-cell *matHeaderCellDef mat-sort-header style="width: 15%">
      USUARIO
    </th>
    <td mat-cell *matCellDef="let row" style="width: 15%">{{ row.usuario }}</td>
  </ng-container>

  <ng-container matColumnDef="rutUsuario">
    <th id="rutUsuarioI" mat-header-cell *matHeaderCellDef mat-sort-header style="width: 15%">
      RUT
    </th>
    <td mat-cell *matCellDef="let row" style="width: 15%">
      {{ row.rutUsuario }}
    </td>
  </ng-container>

  <ng-container matColumnDef="nombres">
    <th id="nombresI" mat-header-cell *matHeaderCellDef mat-sort-header style="width: 20%">
      NOMBRES
    </th>
    <td mat-cell *matCellDef="let row" style="width: 20%">{{ row.nombres }}</td>
  </ng-container>

  <ng-container matColumnDef="apellidoPaterno">
    <th id="apellidoPaternoI" mat-header-cell *matHeaderCellDef mat-sort-header style="width: 20%">
      APELLIDO PATERNO
    </th>
    <td class="ocultar-div" mat-cell *matCellDef="let row" style="width: 20%">
      {{ row.apellidoPaterno }}
    </td>
  </ng-container>

  -
  <ng-container matColumnDef="opciones">
    <th id="opcionesI" mat-header-cell *matHeaderCellDef style="text-align: center; width: 15%">
      <button
        matTooltip="Agregar"
        mat-icon-button
        class="nuevo"
        (click)="agregar('800ms', '500ms')"
      >
        <mat-icon>add</mat-icon>
      </button>
    </th>

    <td mat-cell *matCellDef="let row; let i = index" style="text-align: center; width: 15%">
      <button matTooltip="Modificar" mat-icon-button class="tabla" (click)="editar(row)">
        <mat-icon>edit</mat-icon>
      </button>

      <button matTooltip="Consultar" mat-icon-button class="tabla" (click)="consultar(row)">
        <mat-icon>search</mat-icon>
      </button>
      <!--
          <button matTooltip="Contraseña" color="accent" (click)="reseteaContrasena(row)">
            <mat-icon>vpn_key</mat-icon>
          </button>
-->
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns" class="example-element-row"></tr>
</table>

<mat-paginator #myPaginator [pageSizeOptions]="[10, 20, 30, 100]"></mat-paginator>
