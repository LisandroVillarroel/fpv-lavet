<app-TituloComponente [titulo]="'RAZAS'" />

<section>
  <div class="ml-2 mr-2">
    <mat-form-field class="inputBuscar">
      <mat-icon matPrefix>search</mat-icon>
      <input matInput (keyup)="aplicarFiltro($event)" placeholder="Buscar" />
    </mat-form-field>
  </div>

  <div class="tabla-mantenedor">
    <table
      mat-table
      [dataSource]="dataSource()"
      multiTemplateDataRows
      matSort
      class="tabla-cabecera"
    >
      <ng-container matColumnDef="index">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="col-index">N°</th>
        <td mat-cell *matCellDef="let row; let i = dataIndex" class="col-index">
          {{ i + 1 + myPaginator.pageIndex * myPaginator.pageSize }}
        </td>
      </ng-container>

      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="col-nombre">NOMBRE</th>
        <td mat-cell *matCellDef="let row" class="col-nombre">{{ row.nombre }}</td>
      </ng-container>

      <ng-container matColumnDef="especieNombre">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="col-nombre">ESPECIE</th>
        <td mat-cell *matCellDef="let row" class="col-nombre">{{ row.especieNombre }}</td>
      </ng-container>

      <ng-container matColumnDef="estado">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="col-estado">ESTADO</th>
        <td mat-cell *matCellDef="let row" class="col-estado">{{ row.estado }}</td>
      </ng-container>

      <ng-container matColumnDef="opciones">
        <th mat-header-cell *matHeaderCellDef class="col-opciones opciones-header">
          <button
            matTooltip="Agregar"
            mat-icon-button
            class="nuevo"
            (click)="agregar('800ms', '500ms')"
          >
            <mat-icon>add</mat-icon>
          </button>
        </th>
        <td mat-cell *matCellDef="let row" class="col-opciones opciones-cell">
          <button
            matTooltip="Consultar"
            mat-icon-button
            class="tabla"
            (click)="consultar(row, '800ms', '500ms')"
          >
            <mat-icon>visibility</mat-icon>
          </button>
          <button
            matTooltip="Modificar"
            mat-icon-button
            class="tabla"
            (click)="modificar(row, '800ms', '500ms')"
          >
            <mat-icon>edit</mat-icon>
          </button>
          <button matTooltip="Eliminar" mat-icon-button class="tabla" (click)="eliminar(row)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns" class="example-element-row"></tr>
    </table>

    <mat-paginator #myPaginator [pageSizeOptions]="[10, 20, 30, 100]"></mat-paginator>
  </div>
</section>
