<app-TituloComponente [titulo]="'EMPRESAS'" />

<section>
  <div class="ml-2 mr-2">
    <mat-form-field class="inputBuscar">
      <mat-icon matPrefix>search</mat-icon>
      <input matInput (keyup)="applyFilter($event)" placeholder="Buscar" />
    </mat-form-field>
  </div>

  <div class="tabla-mantenedor">
    <table
      mat-table
      [dataSource]="dataSource()"
      multiTemplateDataRows
      matSort
      class="tabla-cabecera"
    >
      <ng-container matColumnDef="index">
        <th id="indexE" mat-header-cell *matHeaderCellDef mat-sort-header class="col-index">N°</th>
        <td mat-cell *matCellDef="let row; let i = dataIndex" class="col-index">
          {{ i + 1 + myPaginator.pageIndex * myPaginator.pageSize }}
        </td>
      </ng-container>

      <ng-container matColumnDef="rutEmpresa">
        <th id="rutEmpresaE" mat-header-cell *matHeaderCellDef mat-sort-header>RUT</th>
        <td mat-cell *matCellDef="let row">{{ row.rutEmpresa }}</td>
      </ng-container>

      <ng-container matColumnDef="razonSocial">
        <th id="razonSocialE" mat-header-cell *matHeaderCellDef mat-sort-header>RAZÓN SOCIAL</th>
        <td mat-cell *matCellDef="let row">{{ row.razonSocial }}</td>
      </ng-container>

      <ng-container matColumnDef="nombreFantasia">
        <th id="nombreFantasiaE" mat-header-cell *matHeaderCellDef mat-sort-header>
          NOMBRE FANTASÍA
        </th>
        <td mat-cell *matCellDef="let row">{{ row.nombreFantasia }}</td>
      </ng-container>

      <ng-container matColumnDef="tipoEmpresa">
        <th id="tipoEmpresaE" mat-header-cell *matHeaderCellDef mat-sort-header>TIPO</th>
        <td mat-cell *matCellDef="let row">{{ row.tipoEmpresa }}</td>
      </ng-container>

      <ng-container matColumnDef="opciones">
        <th id="opcionesE" mat-header-cell *matHeaderCellDef class="col-opciones opciones-header">
          <button
            matTooltip="Agregar"
            mat-icon-button
            class="nuevo"
            (click)="agregar('800ms', '500ms')"
          >
            <mat-icon>add</mat-icon>
          </button>
        </th>

        <td mat-cell *matCellDef="let row" class="col-opciones opciones-cell">
          <button
            matTooltip="Modificar"
            mat-icon-button
            class="tabla"
            (click)="editar(row, '800ms', '500ms')"
          >
            <mat-icon>edit</mat-icon>
          </button>
          <button matTooltip="Consultar" mat-icon-button class="tabla" (click)="consultar(row)">
            <mat-icon>search</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <mat-paginator #myPaginator [pageSizeOptions]="[10, 20, 30, 100]"></mat-paginator>
  </div>
</section>
